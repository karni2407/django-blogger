{% extends "base.html" %}
{% block title %}Login | My Blog{% endblock %}

{% block content %}

<section class="min-h-screen flex items-center justify-center bg-gradient-to-b from-black via-gray-900 to-black text-white">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-10 w-full max-w-md shadow-lg">
        
        <h2 class="text-2xl font-semibold mb-6 text-center">Login to Your Account</h2>

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-gray-300 mb-2">Username</label>
                <input type="text" name="username" required
                       class="w-full px-4 py-2 rounded-lg bg-white/10 text-white placeholder-gray-400 border border-white/20 focus:outline-none focus:border-white/40 focus:ring-1 focus:ring-white/30 transition">
            </div>

            <div class="mb-6">
                <label class="block text-gray-300 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full px-4 py-2 rounded-lg bg-white/10 text-white placeholder-gray-400 border border-white/20 focus:outline-none focus:border-white/40 focus:ring-1 focus:ring-white/30 transition">
            </div>

            <button type="submit"
                    class="w-full py-3 rounded-full bg-white/10 text-white hover:bg-white hover:text-black font-medium transition">
                Login
            </button>
        </form>

        <p class="text-gray-400 mt-6 text-center">
            Don't have an account? 
            <a href="{% url 'home:register' %}" class="text-white hover:text-gray-300 font-medium">Register</a>
        </p>

    </div>
</section>

{% endblock %}
