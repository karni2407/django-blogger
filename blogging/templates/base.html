{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}
        My Blog
      {% endblock %}
    </title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="antialiased min-h-screen flex flex-col">

    {% include 'navbar.html' %}

    <!-- Centered Flash Messages -->
    {% if messages %}
      <div id="message-container"
           class="fixed inset-0 flex items-center justify-center z-50 pointer-events-none px-4">
        
        <div class="space-y-4 w-full max-w-md">
          {% for message in messages %}
            <div class="message pointer-events-auto px-6 py-4 rounded-xl 
                        backdrop-blur-md bg-gray-900/80 border text-sm 
                        shadow-2xl text-center transition-all duration-500 
                        opacity-100 transform translate-y-0
              {% if message.tags == 'success' %}
                border-green-400/40 text-green-300
              {% elif message.tags == 'error' %}
                border-red-400/40 text-red-300
              {% elif message.tags == 'warning' %}
                border-yellow-400/40 text-yellow-300
              {% else %}
                border-blue-400/40 text-blue-300
              {% endif %}
            ">
              {{ message }}
            </div>
          {% endfor %}
        </div>

      </div>

      <!-- Auto Hide Script -->
      <script>
        setTimeout(() => {
          const messages = document.querySelectorAll('.message');
          messages.forEach(msg => {
            msg.classList.remove('opacity-100', 'translate-y-0');
            msg.classList.add('opacity-0', '-translate-y-4');

            setTimeout(() => {
              msg.remove();
            }, 500);
          });
        }, 3000);
      </script>
    {% endif %}

    <main class="flex-grow pt-16">
      {% block content %}
      {% endblock %}
    </main>

  </body>
</html>
